name: CodeQL Analysis

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-plan:
    name: Detect CodeQL plan
    if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref || github.ref_name || '', 'dependabot/') && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build matrix from override or autodetect
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          if [ -f ".github/codeql/override.json" ]; then
            echo "Using override.json"
            python3 - <<'PY' > matrix.json
import json

with open(".github/codeql/override.json", "r", encoding="utf-8") as f:
    data = json.load(f)

print(json.dumps(data))
PY
          else
            echo "Using autodetect"
            python3 - <<'PY' > matrix.json
import json
import os

include = []

def add(language, build_mode, build_script=""):
    item = {
        "language": language,
        "build_mode": build_mode,
        "build_script": build_script,
    }
    if item not in include:
        include.append(item)

if os.path.isdir(".github/workflows"):
    add("actions", "none")

has_gradle = any(os.path.exists(p) for p in [
    "build.gradle",
    "build.gradle.kts",
    "settings.gradle",
    "settings.gradle.kts",
    "app/build.gradle",
    "app/build.gradle.kts",
    "gradlew",
])

has_android = has_gradle and (
    os.path.isdir("app/src") or
    os.path.isdir("android/app") or
    os.path.isfile("AndroidManifest.xml")
)

has_flutter = os.path.isfile("pubspec.yaml")

if has_android:
    add("java-kotlin", "manual", "android")
elif has_gradle:
    add("java-kotlin", "autobuild")

if (
    os.path.isfile("package.json") or
    os.path.isfile("package-lock.json") or
    os.path.isfile("yarn.lock") or
    os.path.isfile("pnpm-lock.yaml")
):
    add("javascript-typescript", "none")

if (
    os.path.isfile("requirements.txt") or
    os.path.isfile("pyproject.toml") or
    os.path.isfile("setup.py")
):
    add("python", "none")

if os.path.isfile("Gemfile"):
    add("ruby", "none")

if os.path.isfile("Cargo.toml"):
    add("rust", "none")

if os.path.isfile("Package.swift"):
    add("swift", "autobuild")

if has_flutter and not any(i["language"] == "java-kotlin" for i in include):
    add("actions", "none")

if not include:
    add("actions", "none")

print(json.dumps({"include": include}))
PY
          fi

          echo "Generated matrix:"
          cat matrix.json

          {
            echo "matrix<<EOF"
            cat matrix.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  analyze:
    name: CodeQL ${{ matrix.language }} ${{ matrix.build_mode }}
    needs: detect-plan
    if: ${{ needs.detect-plan.result == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        if: ${{ matrix.language == 'java-kotlin' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Initialize CodeQL with repo config
        if: ${{ hashFiles('.github/codeql/codeql-security.yml') != '' }}
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          config-file: .github/codeql/codeql-security.yml

      - name: Initialize CodeQL without repo config
        if: ${{ hashFiles('.github/codeql/codeql-security.yml') == '' }}
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}

      - name: Prepare Android build environment
        if: ${{ matrix.language == 'java-kotlin' && matrix.build_mode == 'manual' && matrix.build_script == 'android' }}
        shell: bash
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_DIR" ]; then
            echo "Android SDK not found in ANDROID_SDK_ROOT or ANDROID_HOME"
            exit 1
          fi

          mkdir -p "$HOME/.gradle"
          {
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=2"
            echo "kotlin.incremental=false"
            echo "kotlin.compiler.execution.strategy=in-process"
          } >> "$HOME/.gradle/gradle.properties"

          {
            echo "sdk.dir=$SDK_DIR"
            [ -n "${KEYSTORE_FILE:-}" ] && echo "KEYSTORE_FILE=$KEYSTORE_FILE"
            [ -n "${KEYSTORE_PASSWORD:-}" ] && echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            [ -n "${KEY_ALIAS:-}" ] && echo "KEY_ALIAS=$KEY_ALIAS"
            [ -n "${KEY_PASSWORD:-}" ] && echo "KEY_PASSWORD=$KEY_PASSWORD"
          } > local.properties

          chmod +x ./gradlew || true

      - name: Build project for CodeQL
        if: ${{ matrix.language == 'java-kotlin' && matrix.build_mode == 'manual' && matrix.build_script == 'android' }}
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean assembleDebug -x lint -x test --stacktrace

      - name: Autobuild project
        if: ${{ matrix.build_mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: report/codeql
          upload: false

      - name: Upload CodeQL SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}
          path: report/codeql/*.sarif
          if-no-files-found: warn