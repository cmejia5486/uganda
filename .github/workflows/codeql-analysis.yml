name: Static SAST (CodeQL)

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    name: Detect CodeQL plan
    if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref || github.ref_name || '', 'dependabot/') && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build matrix from override or autodetect
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          if [ -f ".github/codeql/override.json" ]; then
            echo "Using override.json"
            MATRIX="$(
              python3 - <<'PY'
              import json
              with open('.github/codeql/override.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              print(json.dumps(data))
              PY
            )"
          else
            echo "Using autodetect"
            python3 - <<'PY' > matrix.json
            import json
            import os

            include = []

            def add(language, build_mode, build_script=""):
                item = {
                    "language": language,
                    "build_mode": build_mode,
                    "build_script": build_script
                }
                if item not in include:
                    include.append(item)

            if os.path.isdir(".github/workflows"):
                add("actions", "none")

            has_gradle = any(os.path.exists(p) for p in [
                "build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts",
                "app/build.gradle", "app/build.gradle.kts"
            ])

            has_android = has_gradle and (
                os.path.exists("app/src") or
                os.path.exists("android/app") or
                os.path.exists("gradlew")
            )

            if has_android:
                add("java-kotlin", "manual", "android")
            elif has_gradle:
                add("java-kotlin", "autobuild")

            if os.path.exists("package.json") or os.path.exists("yarn.lock") or os.path.exists("pnpm-lock.yaml"):
                add("javascript-typescript", "none")

            if os.path.exists("requirements.txt") or os.path.exists("pyproject.toml"):
                add("python", "none")

            if os.path.exists("Gemfile"):
                add("ruby", "none")

            if os.path.exists("Cargo.toml"):
                add("rust", "none")

            if os.path.exists("Package.swift"):
                add("swift", "autobuild")

            if not include:
                add("actions", "none")

            print(json.dumps({"include": include}))
            PY
            MATRIX="$(cat matrix.json)"
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  analyze:
    name: CodeQL ${{ matrix.language }}
    needs: detect
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        if: ${{ matrix.language == 'java-kotlin' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          config-file: .github/codeql/codeql-base.yml

      - name: Manual Android build
        if: ${{ matrix.language == 'java-kotlin' && matrix.build_mode == 'manual' && matrix.build_script == 'android' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x .github/codeql/android-build.sh
          .github/codeql/android-build.sh

      - name: Autobuild
        if: ${{ contains(fromJson('["c-cpp","csharp","go","java-kotlin","swift"]'), matrix.language) && matrix.build_mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          output: report/codeql/${{ matrix.language }}
          upload: false

      - name: Upload partial SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}
          path: report/codeql/${{ matrix.language }}/*.sarif
          if-no-files-found: warn

  merge:
    name: Merge final CodeQL SARIF
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Download all partial SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codeql-*
          path: sarif-parts
          merge-multiple: true

      - name: Ensure jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Merge SARIF files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p report/codeql
          shopt -s globstar nullglob
          files=(sarif-parts/**/*.sarif)
          if [ ${#files[@]} -gt 0 ]; then
            jq -s '{ "version":"2.1.0", "runs": (map(.runs) | add) }' "${files[@]}" > report/codeql/merged.sarif
          else
            echo '{ "version":"2.1.0", "runs": [] }' > report/codeql/merged.sarif
          fi

      - name: Upload final single artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-findings
          path: report/codeql/merged.sarif
          if-no-files-found: error