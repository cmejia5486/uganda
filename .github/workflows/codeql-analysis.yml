name: CodeQL Analysis

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-plan:
    name: Detect CodeQL plan
    if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref || github.ref_name || '', 'dependabot/') && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build matrix from override or autodetect
        id: plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const include = [];

            function add(language, build_mode, build_script = '') {
              const item = { language, build_mode, build_script };
              const exists = include.some(x => JSON.stringify(x) === JSON.stringify(item));
              if (!exists) include.push(item);
            }

            if (fs.existsSync('.github/codeql/override.json')) {
              const matrix = JSON.parse(fs.readFileSync('.github/codeql/override.json', 'utf8'));
              core.setOutput('matrix', JSON.stringify(matrix));
              return;
            }

            const exists = (p) => fs.existsSync(p);

            if (exists('.github/workflows')) {
              add('actions', 'none');
            }

            const hasGradle =
              exists('build.gradle') ||
              exists('build.gradle.kts') ||
              exists('settings.gradle') ||
              exists('settings.gradle.kts') ||
              exists('app/build.gradle') ||
              exists('app/build.gradle.kts') ||
              exists('gradlew');

            const hasAndroid =
              hasGradle &&
              (exists('app/src') || exists('android/app') || exists('AndroidManifest.xml'));

            const hasFlutter = exists('pubspec.yaml');

            if (hasAndroid) {
              add('java-kotlin', 'manual', 'android');
            } else if (hasGradle) {
              add('java-kotlin', 'autobuild');
            }

            if (
              exists('package.json') ||
              exists('package-lock.json') ||
              exists('yarn.lock') ||
              exists('pnpm-lock.yaml')
            ) {
              add('javascript-typescript', 'none');
            }

            if (
              exists('requirements.txt') ||
              exists('pyproject.toml') ||
              exists('setup.py')
            ) {
              add('python', 'none');
            }

            if (exists('Gemfile')) {
              add('ruby', 'none');
            }

            if (exists('Cargo.toml')) {
              add('rust', 'none');
            }

            if (exists('Package.swift')) {
              add('swift', 'autobuild');
            }

            if (hasFlutter && !include.some(i => i.language === 'java-kotlin')) {
              add('actions', 'none');
            }

            if (include.length === 0) {
              add('actions', 'none');
            }

            core.setOutput('matrix', JSON.stringify({ include }));

  analyze:
    name: CodeQL ${{ matrix.language }} ${{ matrix.build_mode }}
    needs: detect-plan
    if: ${{ needs.detect-plan.result == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: ${{ matrix.language == 'java-kotlin' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Initialize CodeQL with repo config
        if: ${{ hashFiles('.github/codeql/codeql-security.yml') != '' }}
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          config-file: .github/codeql/codeql-security.yml

      - name: Initialize CodeQL without repo config
        if: ${{ hashFiles('.github/codeql/codeql-security.yml') == '' }}
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}

      - name: Prepare Android build environment
        if: ${{ matrix.language == 'java-kotlin' && matrix.build_mode == 'manual' && matrix.build_script == 'android' }}
        shell: bash
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_DIR" ]; then
            echo "Android SDK not found in ANDROID_SDK_ROOT or ANDROID_HOME"
            exit 1
          fi

          mkdir -p "$HOME/.gradle"
          {
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=2"
            echo "kotlin.incremental=false"
            echo "kotlin.compiler.execution.strategy=in-process"
          } >> "$HOME/.gradle/gradle.properties"

          {
            echo "sdk.dir=$SDK_DIR"
            [ -n "${KEYSTORE_FILE:-}" ] && echo "KEYSTORE_FILE=$KEYSTORE_FILE"
            [ -n "${KEYSTORE_PASSWORD:-}" ] && echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            [ -n "${KEY_ALIAS:-}" ] && echo "KEY_ALIAS=$KEY_ALIAS"
            [ -n "${KEY_PASSWORD:-}" ] && echo "KEY_PASSWORD=$KEY_PASSWORD"
          } > local.properties

          chmod +x ./gradlew || true

      - name: Build project for CodeQL
        if: ${{ matrix.language == 'java-kotlin' && matrix.build_mode == 'manual' && matrix.build_script == 'android' }}
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean assembleDebug -x lint -x test --stacktrace

      - name: Autobuild project
        if: ${{ matrix.build_mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: report/codeql
          upload: false

      - name: Upload CodeQL SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}
          path: report/codeql/*.sarif
          if-no-files-found: warn