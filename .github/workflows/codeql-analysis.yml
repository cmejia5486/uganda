name: Static SAST

on:
  workflow_call:
    inputs:
      codeql-language:
        description: "Lenguaje para CodeQL"
        required: false
        type: string
        default: "java"
      codeql-build-mode:
        description: "manual o none"
        required: false
        type: string
        default: "manual"
      codeql-config-file:
        description: "Ruta del config de CodeQL"
        required: false
        type: string
        default: ".github/codeql/codeql-security.yml"
      build-command:
        description: "Comando de build para CodeQL cuando build-mode=manual"
        required: false
        type: string
        default: "./gradlew assembleDebug --no-daemon -x lint"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sast:
    name: SAST security-only report-only
    if: ${{ github.actor != 'dependabot[bot]' && !startsWith(github.head_ref || github.ref_name || '', 'dependabot/') && (github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]') }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: ${{ inputs.codeql-language == 'java' }}
        uses: android-actions/setup-android@v3

      - name: Create temporary local.properties
        if: ${{ inputs.codeql-language == 'java' }}
        shell: bash
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          SDK_PATH="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "${SDK_PATH}" ]; then
            echo "No se encontró ANDROID_SDK_ROOT ni ANDROID_HOME"
            exit 1
          fi

          {
            echo "sdk.dir=${SDK_PATH}"
            [ -n "${KEYSTORE_FILE:-}" ] && echo "KEYSTORE_FILE=${KEYSTORE_FILE}"
            [ -n "${KEYSTORE_PASSWORD:-}" ] && echo "KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}"
            [ -n "${KEY_ALIAS:-}" ] && echo "KEY_ALIAS=${KEY_ALIAS}"
            [ -n "${KEY_PASSWORD:-}" ] && echo "KEY_PASSWORD=${KEY_PASSWORD}"
          } > local.properties

          echo "local.properties generado temporalmente"

      - name: Make gradlew executable
        if: ${{ inputs.codeql-build-mode == 'manual' && hashFiles('gradlew') != '' }}
        shell: bash
        run: chmod +x ./gradlew

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ inputs.codeql-language }}
          build-mode: ${{ inputs.codeql-build-mode }}
          config-file: ${{ inputs.codeql-config-file }}

      - name: Build project for CodeQL
        if: ${{ inputs.codeql-build-mode == 'manual' }}
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.build-command }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: report/codeql
          upload: false
        continue-on-error: true

      - name: Download detekt CLI
        if: ${{ inputs.codeql-language == 'java' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tools
          curl -L -o tools/detekt-cli.jar https://github.com/detekt/detekt/releases/download/v1.23.8/detekt-cli-1.23.8-all.jar

      - name: Run detekt to SARIF
        if: ${{ inputs.codeql-language == 'java' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p report
          java -jar tools/detekt-cli.jar -i . --all-rules --report sarif:report/detekt.sarif || true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Semgrep
        shell: bash
        run: |
          set -euo pipefail
          pip install --upgrade semgrep

      - name: Run Semgrep to SARIF
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p report
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --severity WARNING \
            --severity ERROR \
            --sarif \
            --output report/semgrep.raw.sarif || true

      - name: Filter Semgrep SARIF keep app code only
        uses: advanced-security/filter-sarif@v1
        with:
          input: report/semgrep.raw.sarif
          output: report/semgrep.sarif
          patterns: |
            -**/test/**
            -**/androidTest/**
            -**/*Test*.kt
            -**/*Test*.java
            **/src/**

      - name: Ensure jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Merge SARIFs CodeQL Detekt Semgrep
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p report

          files=(report/codeql/*.sarif report/detekt.sarif report/semgrep.sarif)

          if [ ${#files[@]} -gt 0 ]; then
            jq -s '{ "version":"2.1.0", "runs": (map(.runs) | add) }' "${files[@]}" > report/merged.sarif
          else
            echo '{ "version":"2.1.0", "runs": [] }' > report/merged.sarif
          fi

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sast-findings
          path: |
            report/*.sarif
            report/codeql/*.sarif
          if-no-files-found: warn