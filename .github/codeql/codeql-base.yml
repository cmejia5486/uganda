name: "Generic app security config"

queries:
  - uses: security-extended

paths-ignore:
  - "**/.git/**"
  - "**/.github/**"
  - "**/.gradle/**"
  - "**/.idea/**"
  - "**/.dart_tool/**"
  - "**/.scannerwork/**"
  - "**/build/**"
  - "**/dist/**"
  - "**/out/**"
  - "**/target/**"
  - "**/bin/**"
  - "**/obj/**"
  - "**/coverage/**"
  - "**/node_modules/**"
  - "**/Pods/**"
  - "**/vendor/**"
  - "**/tmp/**"
  - "**/temp/**"
  - "**/generated/**"
  - "**/gen/**"
  - "**/docs/**"
  - "**/samples/**"
  - "**/examples/**"